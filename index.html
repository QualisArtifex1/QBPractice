<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Academic Team Practice Score Sheet</title>
  <style>
    :root {
      --primary: #4169e1;
      --background: #ffffff;
      --text: #333333;
      --power-green: #28a745;
      --tossup-blue: #0069d9;
      --bbpower-blue: #17a2b8;
      --bb-yellow: #ffc107;
      --neg-red: #dc3545;
      --neg-warning-bg: #f8d7da;
      --notif-bg: #333;
      --notif-text: #fff;
    }
    * { box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background-color: var(--background);
      color: var(--text);
      margin: 20px;
      position: relative;
    }
    header {
      background-color: var(--primary);
      color: var(--background);
      padding: 15px;
      text-align: center;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .controls label { font-weight: bold; }
    .controls input[type="date"],
    .controls input[type="number"] {
      padding: 5px;
      border: 1px solid #ccc;
      border-radius: 4px;
      margin-left: 5px;
      width: auto;
    }
    .controls input[type="checkbox"] {
      margin-left: 10px;
      transform: scale(1.2);
      cursor: pointer;
    }
    button {
      padding: 6px 10px;
      border: none;
      border-radius: 4px;
      color: var(--background);
      cursor: pointer;
      margin-left: 5px;
      min-width: 8ch;
      white-space: nowrap;
      line-height: normal;
    }
    button:hover { opacity: 0.9; }
    .power-btn   { background-color: var(--power-green); }
    .tossup-btn  { background-color: var(--tossup-blue); }
    .bbpower-btn { background-color: var(--bbpower-blue); }
    .bb-btn      { background-color: var(--bb-yellow); color: #000; }
    .neg-btn     { background-color: var(--neg-red); }
    .undo-btn    { background-color: #6c757d; } /* gray-ish undo */

    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 20px;
    }
    th, td {
      padding: 8px 12px;
      text-align: center;
      vertical-align: middle;
    }
    th {
      background-color: var(--primary);
      color: var(--background);
    }
    tr:nth-child(even) { background-color: #f2f2f2; }
    tr:hover           { background-color: #e6e6e6; }
    .neg-warning { background-color: var(--neg-warning-bg) !important; }

    input.name-input {
      width: 100%;
      padding: 5px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    .score-cell {
      font-weight: bold;
      display: inline-block;
      min-width: 3ch;
      text-align: right;
    }
    /* Split room mode: grid two columns and flex rows */
    #scoreTable.split thead,
    #scoreTable.split tfoot { display: none; }
    #scoreTable.split tbody {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    #scoreTable.split tbody tr {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
    /* Notification */
    #copyNotif {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--notif-bg);
      color: var(--notif-text);
      padding: 10px 15px;
      border-radius: 4px;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }
    #copyNotif.show { opacity: 1; }
  </style>
</head>
<body>
  <header>
    <h1>Academic Team Practice Score Sheet</h1>
  </header>

  <div class="controls">
    <label for="practiceDate">Date:</label>
    <input type="date" id="practiceDate">

    <label for="powerValue">Power:</label>
    <input type="number" id="powerValue" value="15">

    <label for="tossupValue">Tossup:</label>
    <input type="number" id="tossupValue" value="10">

    <label for="bbPowerValue">BB Power:</label>
    <input type="number" id="bbPowerValue" value="10">

    <label for="bbValue">Bounce Back:</label>
    <input type="number" id="bbValue" value="5">

    <label for="negValue">Neg:</label>
    <input type="number" id="negValue" value="-5">

    <label for="splitToggle">Split Room</label>
    <input type="checkbox" id="splitToggle">

    <button id="addPlayerBtn" class="tossup-btn" type="button">Add Player</button>
    <button id="undoBtn"      class="undo-btn"   type="button">Undo</button>
    <button id="finishBtn"    class="tossup-btn" type="button">Copy Scores</button>
    <button id="clearBtn"     class="tossup-btn" type="button">Start New Practice</button>
  </div>

  <table id="scoreTable">
    <thead>
      <tr>
        <th>Name</th>
        <th>Score</th>
        <th>Power</th>
        <th>Tossup</th>
        <th>BB Power</th>
        <th>BB</th>
        <th>Neg</th>
      </tr>
    </thead>
    <tbody id="scoreBody"></tbody>
  </table>

  <div id="copyNotif">Copied to clipboard!</div>

  <script>
    // → Global action stack to record each scoring event
    let actionStack = [];

    document.addEventListener('DOMContentLoaded', () => {
      // Set today's date by default
      document.getElementById('practiceDate').valueAsDate = new Date();

      document.getElementById('addPlayerBtn').onclick = addPlayerRow;
      document.getElementById('undoBtn').onclick      = undoLastAction;
      document.getElementById('finishBtn').onclick    = finishPractice;
      document.getElementById('clearBtn').onclick     = clearPractice;
      document.getElementById('splitToggle').onchange = toggleSplit;

      // Start with 4 blank rows
      for (let i = 0; i < 4; i++) addPlayerRow();
    });

    function addPlayerRow() {
      const tbody = document.getElementById('scoreBody');
      const tr = document.createElement('tr');

      tr.innerHTML = `
        <td><input type="text" class="name-input" placeholder="Enter name"></td>
        <td class="score-cell">0</td>
        <td>
          <button class="power-btn"   onclick="updateScore(this,'power')">Power</button>
          <span class="power-count">0</span>
        </td>
        <td>
          <button class="tossup-btn"  onclick="updateScore(this,'tossup')">Tossup</button>
          <span class="tossup-count">0</span>
        </td>
        <td>
          <button class="bbpower-btn" onclick="updateScore(this,'bbPower')">BB Power</button>
          <span class="bbPower-count">0</span>
        </td>
        <td>
          <button class="bb-btn"      onclick="updateScore(this,'bb')">BB</button>
          <span class="bb-count">0</span>
        </td>
        <td>
          <button class="neg-btn"     onclick="updateScore(this,'neg')">Neg</button>
          <span class="neg-count">0</span>
        </td>
      `;

      tbody.appendChild(tr);
    }

    function updateScore(btn, type) {
      const valueInputId = type + 'Value';
      const val = parseInt(document.getElementById(valueInputId).value, 10) || 0;
      const row = btn.closest('tr');

      // Record this action on the stack BEFORE we mutate anything
      actionStack.push({
        row,
        type,
        value: val
      });

      // Now actually update the UI:
      const scoreCell = row.querySelector('.score-cell');
      const countSpan = row.querySelector(`.${type}-count`);

      // Increase total score
      const oldScore = parseInt(scoreCell.textContent, 10);
      scoreCell.textContent = oldScore + val;

      // Increase the count for this category
      const oldCount = parseInt(countSpan.textContent, 10);
      const newCount = oldCount + 1;
      countSpan.textContent = newCount;

      // If it's a neg and crosses the warning threshold, add warning class
      if (type === 'neg' && newCount >= 6) {
        row.classList.add('neg-warning');
      }
    }

    function undoLastAction() {
      // If there's nothing to undo, do nothing
      if (actionStack.length === 0) return;

      // Remove the last action from the stack
      const { row, type, value } = actionStack.pop();

      // Revert the score change
      const scoreCell = row.querySelector('.score-cell');
      const currentScore = parseInt(scoreCell.textContent, 10);
      scoreCell.textContent = currentScore - value;

      // Revert the count decrement
      const countSpan = row.querySelector(`.${type}-count`);
      const currentCount = parseInt(countSpan.textContent, 10);
      const newCount = currentCount - 1;
      countSpan.textContent = newCount;

      // If it was a neg that just fell below 6, remove the warning background
      if (type === 'neg' && newCount < 6) {
        row.classList.remove('neg-warning');
      }
    }

    function finishPractice() {
      const date = document.getElementById('practiceDate').value;
      let text = `Practice Date: ${date}\n\n`;

      // Grab each row's name and score
      document.querySelectorAll('#scoreBody tr').forEach(row => {
        const name = row.querySelector('.name-input').value || 'Unnamed';
        const score = row.querySelector('.score-cell').textContent;
        text += `${name}: ${score}\n`;
      });

      fallbackCopy(text);
    }

    function fallbackCopy(text) {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'absolute';
      ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.select();
      try {
        document.execCommand('copy');
        showNotif();
      } catch {
        alert('Could not copy to clipboard. Please copy manually:\n' + text);
      }
      document.body.removeChild(ta);
    }

    function showNotif() {
      const n = document.getElementById('copyNotif');
      n.classList.add('show');
      setTimeout(() => n.classList.remove('show'), 2000);
    }

    function clearPractice() {
      // Clear out all rows and reset the date
      document.getElementById('scoreBody').innerHTML = '';
      document.getElementById('practiceDate').valueAsDate = new Date();

      // Reset the action stack so old actions can't be undone
      actionStack = [];

      // Add 4 blank rows again
      for (let i = 0; i < 4; i++) addPlayerRow();
    }

    function toggleSplit(e) {
      const table = document.getElementById('scoreTable');
      e.target.checked
        ? table.classList.add('split')
        : table.classList.remove('split');
    }
  </script>
</body>
</html>
